        - NEXT_PUBLIC_SUPABASE_URL=https://btdfzxttyknywewfkayw.supabase.co
        - NEXT_PUBLIC_SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ0ZGZ6eHR0eWtueXdld2ZrYXl3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxODgzODMsImV4cCI6MjA5NTc2NDM4M30.zo98XPhUDS4tVHi446g6CBqfxXjDZyqQ6sst-By3hoQ
    ports:
