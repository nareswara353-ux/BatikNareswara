services:
  batik-processor:
    container_name: batik-processor
    build:
      context: ./batik-processor
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    networks:
      - batik-network
    restart: unless-stopped

  backend-service:
    container_name: batik-backend
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "5000:5000" # 🔥 FIX: Samakan port luar dan dalam kontainer menjadi 5000
    environment:
      - RustService__Url=http://batik-processor:8080
      - ASPNETCORE_URLS=http://+:5000 # 🔥 FIX: Paksa kestrel jalan di port 5000
    depends_on:
      - batik-processor
    networks:
      - batik-network
    restart: unless-stopped

  frontend-service:
    container_name: batik-frontend
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=pk_test_bmV1dHJhbC1jaWNhZGEtMy5jbGVyay5hY2NvdW50cy5kZXYk
        # 🔥 FIX UTAMA: Arahkan browser langsung ke port publik .NET (5000)
